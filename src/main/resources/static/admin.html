<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshMart | Admin Dashboard</title>
  <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="sidebar">
  <div class="logo-details">
    <i class="bx bx-leaf"></i>
    <span class="logo_name">FreshMart</span>
  </div>
  <ul class="nav-links">
    <li>
      <a href="admin.html" class="active">
        <i class="bx bx-grid-alt"></i>
        <span class="links_name">Dashboard</span>
      </a>
    </li>
    <li>
      <a href="product.html">
        <i class="bx bx-box"></i>
        <span class="links_name">Products</span>
      </a>
    </li>
    <li>
      <a href="accounts.html">
        <i class="bx bx-user-circle"></i>
        <span class="links_name">Accounts</span>
      </a>
    </li>
    <li>
      <a href="customer_order.html">
        <i class="bx bx-cart"></i>
        <span class="links_name">Orders</span>
      </a>
    </li>
    <li class="log_out">
      <a href="login.html">
        <i class="bx bx-log-out"></i>
        <span class="links_name">Log out</span>
      </a>
    </li>
  </ul>
</div>

<section class="home-section">
  <nav>
    <div class="sidebar-button">
      <i class="bx bx-menu sidebarBtn"></i>
      <span class="dashboard">Dashboard</span>
    </div>
    <div class="search-box">
      <input type="text" placeholder="Search...">
    </div>
    <div class="profile-details">
      <span class="admin_name" id="adminName">Admin</span>
    </div>
  </nav>

  <div class="home-content">
    <div class="overview-boxes">
      <div class="box">
        <div class="right-side">
          <div class="box-topic">Products Management</div>
          <div class="number"><a href="product.html" style="color:inherit;text-decoration:none;">Products</a></div>
        </div>
      </div>
      <div class="box">
        <div class="right-side">
          <div class="box-topic">Account Management</div>
          <div class="number"><a href="accounts.html" style="color:inherit;text-decoration:none;">Accounts</a></div>
        </div>
      </div>
      <div class="box">
        <div class="right-side">
          <div class="box-topic">Order Management</div>
          <div class="number"><a href="admin_orders.html" style="color:inherit;text-decoration:none;">Orders</a></div>
        </div>
      </div>
    </div>
  </div>
</section>

  <div id="admin-island" class="admin-island">
    <div class="island-main">
      <div class="island-content">
        <i class='bx bx-bell'></i>
        <span id="island-msg">New Order Received!</span>
      </div>
    </div>
    <div class="island-expanded" id="admin-island-expanded">
       <p id="island-order-id">#Order ID</p>
       <a href="admin_orders.html" class="island-btn">Manage Now</a>
    </div>
  </div>

  <style>
    .admin-island {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 10px 25px;
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: all 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      z-index: 2000;
      min-width: 200px;
      cursor: pointer;
      opacity: 0;
    }
    .admin-island.active {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .island-main {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .island-expanded {
      max-height: 0;
      overflow: hidden;
      transition: 0.4s ease;
      width: 100%;
      text-align: center;
    }
    .admin-island.expanded .island-expanded {
      max-height: 100px;
      padding-top: 10px;
    }
    .island-btn {
      display: inline-block;
      margin-top: 5px;
      background: #23b236;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }
  </style>

<script src="js/admin.js"></script>
</body>
</html>

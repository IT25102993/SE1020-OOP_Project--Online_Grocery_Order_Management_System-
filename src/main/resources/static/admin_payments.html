<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshMart | Payment Management</title>
  <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .payments-section { padding: 25px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 14px;
      padding: 22px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .stat-icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .stat-icon.green  { background: #e8f9ed; color: #23b236; }
    .stat-icon.blue   { background: #e8f0ff; color: #2a5298; }
    .stat-icon.orange { background: #fff4e5; color: #e67e22; }

    .stat-label { font-size: 13px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; color: #14284a; }

    .payments-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 25px;
      border-bottom: 1px solid #f0f0f0;
    }

    .card-header h3 { margin: 0; color: #14284a; font-size: 18px; }

    .filter-bar { display: flex; gap: 8px; }

    .filter-btn {
      background: #f5f5f5;
      border: none;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
      color: #555;
    }

    .filter-btn.active,
    .filter-btn:hover { background: #14284a; color: white; }

    .payments-table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: #f8fafc;
    }

    thead th {
      padding: 14px 18px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }

    tbody td {
      padding: 14px 18px;
      border-bottom: 1px solid #f5f5f5;
      color: #333;
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafbff; }

    .method-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .method-badge.card { background: #e8f0ff; color: #2a5298; }
    .method-badge.cod  { background: #fff4e5; color: #e67e22; }

    .pay-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .pay-status.paid    { background: #e8f9ed; color: #23b236; }
    .pay-status.pending { background: #fff3cd; color: #856404; }

    .toggle-btn {
      border: none;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .paid-btn    { background: #e8f9ed; color: #23b236; }
    .paid-btn:hover { background: #23b236; color: white; }
    .pending-btn { background: #fff3cd; color: #856404; }
    .pending-btn:hover { background: #856404; color: white; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo-details">
    <i class="bx bx-leaf"></i>
    <span class="logo_name">FreshMart</span>
  </div>
  <ul class="nav-links">
    <li><a href="admin.html"><i class="bx bx-grid-alt"></i><span class="links_name">Dashboard</span></a></li>
    <li><a href="product.html"><i class="bx bx-box"></i><span class="links_name">Products</span></a></li>
    <li><a href="accounts.html"><i class="bx bx-user-circle"></i><span class="links_name">Accounts</span></a></li>
    <li><a href="admin_orders.html"><i class="bx bx-cart"></i><span class="links_name">Orders</span></a></li>
    <li><a href="admin_payments.html" class="active"><i class="bx bx-credit-card"></i><span class="links_name">Payments</span></a></li>
    <li class="log_out"><a href="login.html"><i class="bx bx-log-out"></i><span class="links_name">Log out</span></a></li>
  </ul>
</div>

<section class="home-section">
  <nav>
    <div class="sidebar-button">
      <i class="bx bx-menu sidebarBtn"></i>
      <span class="dashboard">Payment Management</span>
    </div>
    <div class="profile-details">
      <span class="admin_name" id="adminName">Admin</span>
    </div>
  </nav>

  <div class="home-content payments-section">

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon green"><i class="bx bx-money"></i></div>
        <div>
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value" id="total-revenue">Rs. 0.00</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue"><i class="bx bx-check-circle"></i></div>
        <div>
          <div class="stat-label">Paid Payments</div>
          <div class="stat-value" id="total-paid">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange"><i class="bx bx-time-five"></i></div>
        <div>
          <div class="stat-label">Pending Payments</div>
          <div class="stat-value" id="total-pending">0</div>
        </div>
      </div>
    </div>

    <!-- Payments Table -->
    <div class="payments-card">
      <div class="card-header">
        <h3><i class='bx bx-credit-card' style="color:#23b236;margin-right:8px;"></i>All Payments</h3>
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="PAID">Paid</button>
          <button class="filter-btn" data-filter="PENDING">Pending</button>
        </div>
      </div>
      <div class="payments-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pay ID</th>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Email</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Status</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="payments-table-body">
            <tr><td colspan="8" style="text-align:center;padding:40px;opacity:0.5;">Loading payments...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>

<script src="js/admin.js"></script>
<script src="js/admin_payments.js"></script>
</body>
</html>

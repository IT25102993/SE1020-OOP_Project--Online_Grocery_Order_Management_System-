<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
  <title>Log in | FreshMart</title>
  <link rel="stylesheet" href="css/register_login.css">
</head>
<body>
  <header class="navbar">
    <h1 style="color:#14284a">FRESH<span style="color:#1fa831">MART</span></h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Register</a>
    </nav>
  </header>
  <main class="login-wrapper">
    <l class="container">
      <form id="loginForm">
        <h2>Login</h2>
        <div class="input-field">
          <input type="text" id="email" required>
          <label>Enter your email</label>
        </div>
        <div class="input-field">
          <input type="password" id="password" required>
          <label>Enter your password</label>
          <img src="images/hidden.png" id="togglePassword" class="toggle-icon" alt="Toggle Visibility">
        </div>
        <div class="password-options">
          <label for="remember"><input type="checkbox" id="remember"><p>Remember Me</p></label>
          <a href="#">Forgot Password</a>
        </div>
        <button type="submit">Login</button>
        <div class="account-options">
          <p>Don't have an account? <a href="register.html">Register</a></p>
        </div>
      </form>
    </l>
  </main>
    <div id="cart-island" class="cart-island">
        <div class="island-content">
            <span id="island-text">Items in Cart</span>
            <span class="island-count" id="island-count">0</span>
        </div>
    </div>

  <script src="js/login.js"></script>
  <script src="js/order.js"></script>
</body>
</html>

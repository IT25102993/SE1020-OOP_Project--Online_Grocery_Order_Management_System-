<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
    <title>FreshMart | Checkout</title>
    <link rel="stylesheet" href="css/order.css">
    <style>
        /* ... Your existing styles ... */
        .checkout-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }

        .checkout-form h2, .order-summary h2 { margin-bottom: 25px; color: #14284a; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; transition: 0.3s;
        }

        /* FIX: Hide card details by default */
        #card-details {
            display: none;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 10px;
            margin-top: 15px;
        }

        .order-summary { background: #fcfcfc; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        .summary-total { border-top: 2px solid #eee; margin-top: 15px; padding-top: 15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; color: #14284a; }
        .confirm-btn { width: 100%; background: #23b236; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }

        @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
    </style>
</head>

<body>
<header class="navbar">
    <h1 style="padding: 20px; color:#14284a">FRESH<span style="color:#1fa831">MART</span></h1>
</header>

<main>
    <div class="checkout-container">
        <div class="checkout-form">
            <h2>Shipping & Payment</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full-name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <textarea id="address" rows="3" required placeholder="House No, Street, City"></textarea>
                </div>

                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="payment-method" onchange="toggleCardDetails()">
                        <option value="cod">Cash on Delivery</option>
                        <option value="card">Credit/Debit Card (Demo)</option>
                    </select>
                </div>

                <div id="card-details" class="form-group">
                    <h4 style="color: #14284a; margin-top: 0;">Card Information</h4><br>
                    <div class="form-group">
                        <label>Bank Name</label>
                        <select id="bank-name">
                            <option value="BOC">Bank of Ceylon</option>
                            <option value="NSB">National Savings Bank</option>
                            <option value="PB">Peoples Bank</option>
                            <option value="AB">Amana Bank</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="1234 5678 9101 1121">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 2;">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM/YY">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>CVV</label>
                            <input type="text" placeholder="123">
                        </div>
                    </div>
                    <div class="form-group" >
                        <label>Card Holder Name</label>
                        <input type="text" placeholder="Card Holder Name">
                    </div>
                </div>
            </form>
        </div>

        <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="summary-items-list"></div>
            <div class="summary-total">
                <span>Total</span>
                <span>Rs. <span id="summary-total-amount">0</span></span>
            </div>
            <button type="submit" form="checkout-form" class="confirm-btn">Confirm Order</button>
        </div>
    </div>
</main>

<script src="js/checkouts.js"></script>

<script>
    function toggleCardDetails() {
        const selection = document.getElementById('payment-method').value;
        const cardSection = document.getElementById('card-details');

        if (selection === 'card') {
            cardSection.style.display = 'block';
        } else {
            cardSection.style.display = 'none';
        }
    }
</script>
</body>
</html>

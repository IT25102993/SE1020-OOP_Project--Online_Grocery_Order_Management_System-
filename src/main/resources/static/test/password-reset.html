<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
    <title>FreshMart | My Profile</title>
    <link rel="stylesheet" href="css/register_login.css">
    <style>
        .profile-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 400px;
            margin: 40px auto;
            color: white;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .save-btn {
            width: 100%;
            padding: 12px;
            background: #23b236;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .save-btn:hover { background: #1e8e2b; }
        .back-link {
            display: block;
            margin-top: 15px;
            color: #89ec8e;
            text-decoration: none;
        }

        /* Order Section Styles */
        .orders-container {
            max-width: 900px;
            margin: 40px auto;
            color: white;
            padding: 0 20px;
        }
        .order-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .order-status-track {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 40px 0;
            padding: 0 10px;
        }
        .order-status-track::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255,255,255,0.1);
            transform: translateY(-50%);
            z-index: 1;
        }
        .status-step {
            width: 30px;
            height: 30px;
            background: #444;
            border-radius: 50%;
            z-index: 2;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.5s ease;
        }
        .status-step.active {
            background: #23b236;
            box-shadow: 0 0 15px #23b236;
            transform: scale(1.2);
        }
        .status-label {
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            white-space: nowrap;
            opacity: 0.6;
            transition: 0.3s;
        }
        .status-step.active .status-label {
            opacity: 1;
            font-weight: bold;
            color: #89ec8e;
            font-size: 11px;
        }
        .driver-info {
            background: rgba(35, 178, 54, 0.1);
            border: 1px dashed #23b236;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .driver-icon {
            font-size: 24px;
        }
        .playback-animation {
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(35, 178, 54, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(35, 178, 54, 0); }
            100% { box-shadow: 0 0 0 0 rgba(35, 178, 54, 0); }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <h1 class="head">FreshMart Profile</h1>
        <nav>
            <a href="order.html">Back to Shop</a>
            <a href="login.html" onclick="sessionStorage.clear()">Logout</a>
        </nav>
    </header>

    <main class="login-wrapper">
        <div class="profile-container">
            <h2>Account Details</h2>
            <form id="profile-form">
                <div class="form-group">
                    <label>Email (read-only)</label>
                    <input type="email" id="profile-email" readonly>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="profile-name" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="profile-address" required>
                </div>
                <div class="form-group" id="verification-wrap" style="display: none;">
                    <label>Verification Code <span id="profile-timer" style="color: #89ec8e; font-size: 0.8em; margin-left: 10px;"></span></label>
                    <input type="text" id="profile-code" placeholder="6-digit code">
                </div>
                <button type="button" id="btn-send-code" class="save-btn" style="background:#2a5298; margin-bottom: 10px;">Send Verification Code</button>
                <button type="submit" id="btn-save" class="save-btn" style="display: none;">Save Changes</button>
            </form>
            <p id="profile-message" style="margin-top:15px;"></p>
            <a href="order.html" class="back-link">&larr; Continue Shopping</a>
        </div>

        <div class="orders-container">
            <h2 style="margin-bottom: 20px; border-left: 4px solid #23b236; padding-left: 15px;">My Orders</h2>
            <div id="orders-list">
                <p style="opacity: 0.6;">Loading your orders...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <h2><b>FreshMart</b></h2>
        <p>Healthy Living</p>
        <p>&copy; 2026 All Rights Reserved By FreshMart</p>
    </footer>

    <div id="cart-island" class="cart-island">
        <div class="island-content">
            <span id="island-text">Items in Cart</span>
            <span class="island-count" id="island-count">0</span>
        </div>
    </div>

    <script src="js/profile.js"></script>
    <script src="js/order.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart | Product Management</title>
    <link rel="stylesheet" href="admin.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="sidebar">
        <div class="logo-details">
            <i class='bx bxl-codepen'></i>
            <span class="logo_name">FreshMart</span>
        </div>
        <ul class="nav-links">
            <li><a href="admin.html"><i class='bx bx-grid-alt'></i><span class="links_name">Dashboard</span></a></li>
            <li><a href="test.html" class="active"><i class='bx bx-box'></i><span class="links_name">Products</span></a></li>
            <li><a href="#"><i class='bx bx-list-ul'></i><span class="links_name">Order List</span></a></li>
            <li><a href="#"><i class='bx bx-pie-chart-alt-2'></i><span class="links_name">Analytics</span></a></li>
            <li><a href="#"><i class='bx bx-user'></i><span class="links_name">Team</span></a></li>
            <li><a href="#"><i class='bx bx-cog'></i><span class="links_name">Settings</span></a></li>
            <li class="log_out"><a href="#"><i class='bx bx-log-out'></i><span class="links_name">Log out</span></a></li>
        </ul>
    </div>

    <section class="home-section">
        <nav>
            <div class="sidebar-button">
                <i class='bx bx-menu sidebarBtn'></i>
                <span class="dashboard">Product Management</span>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Search...">
                <i class='bx bx-search'></i>
            </div>
            <div class="profile-details">
                <span class="admin_name">Admin</span>
            </div>
        </nav>

        <div class="home-content">
            <h3>Inventory Overview</h3>
        </div>

        <div class="home-content">
            <div class="overview-boxes">
                <div class="box">
                    <div class="right-side">
                        <div class="box-topic">Products</div>
                        <div class="number">Add Products
                            <button class="category-btn" onclick="window.location.href='add-product.html';">Add</button>
                        </div>
                    </div>
                    <i class='bx bx-cart-alt cart'></i>
                </div>
                <div class="box">
                    <div class="right-side">
                        <div class="box-topic">Products</div>
                        <div class="number">Remove Products
                            <button class="category-btn" onclick="window.location.href='add-product.html';">Remove</button>
                        </div>
                    </div>
                    <i class='bx bxs-wallet-alt cart two'></i>
                </div>
                <div class="box">
                    <div class="right-side">
                        <div class="box-topic">Products</div>
                        <div class="number">View Products
                            <button class="category-btn" onclick="window.location.href='add-product.html';">
                                view
                            </button>
                        </div>
                    </div>
                    <i class='bx bxs-wallet-alt cart two'></i>
                </div>
            </div>
        </div>
    </section>

    <script src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Add Product</title>
    <link rel="stylesheet" href="order.css">
    <style>
        .admin-form {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
        }
        .admin-form input, .admin-form select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .preview-box {
            text-align: center;
            margin-bottom: 15px;
        }
        #imgPreview {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            display: none;
            border: 2px solid #2a5298;
        }
    </style>
</head>
<body>
<header class="navbar">
    <h1 class="head">FreshMart Admin</h1>
    <nav><a href="order.html">View Store</a></nav>
</header>

<div class="admin-form">
    <h2>Add New Product</h2>
    <div class="preview-box">
        <img id="imgPreview" src="" alt="Preview">
    </div>

    <form id="productForm">
        <input type="text" id="pId" placeholder="Product ID (e.g., P001)" required>
        <input type="text" id="pName" placeholder="Product Name" required>
        <input type="number" id="pPrice" placeholder="Price (Rs.)" required>
        <input type="number" id="pStock" placeholder="Stock Quantity" required>

        <label>Category:</label>
        <select id="pCategory">
            <option value="fruits">Fruits</option>
            <option value="vegetables">Vegetables</option>
            <option value="dairy">Dairy</option>
            <option value="frozen_food">Frozen Food</option>
            <option value="grocery">Grocery</option>
        </select>

        <label>Product Image (Will be saved as ID):</label>
        <input type="file" id="pImage" accept="image/*" required>

        <button type="submit" class="category-btn active" style="width:100%; margin-top:20px;">Save Product</button>
    </form>
</div>

<script>
    const pImage = document.getElementById('pImage');
    const imgPreview = document.getElementById('imgPreview');
    let base64Image = "";

    // Handle Image Preview and Data conversion
    pImage.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                imgPreview.src = base64Image;
                imgPreview.style.display = "inline-block";
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('productForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const pId = document.getElementById('pId').value;

        const newProduct = {
            id: pId,
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            stock: document.getElementById('pStock').value,
            category: document.getElementById('pCategory').value,
            // This simulates saving to images/products_pics/ID.png
            imagePath: base64Image
        };

        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
        inventory.push(newProduct);
        localStorage.setItem('inventory', JSON.stringify(inventory));

        alert(`Product ${pId} added successfully!`);
        window.location.href = "order.html";
    });
</script>
</body>
</html>

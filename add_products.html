<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Add Product</title>
    <link rel="stylesheet" href="order.css">
    <style>
        .admin-form {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
        }
        .admin-form input, .admin-form select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <h1 class="head">FreshMart Admin</h1>
        <nav><a href="order.html">View Store</a></nav>
    </header>

    <div class="admin-form">
        <h2>Add New Product</h2>
        <form action="SaveProduct" method="POST">
            <input type="text" name="pId" placeholder="Product ID (e.g., P001)" required>
            <input type="text" name="pName" placeholder="Product Name" required>
            <input type="number" name="pPrice" placeholder="Price (Rs.)" required>
            <input type="number" name="pStock" placeholder="Stock Quantity" required>
            
            <label>Category:</label>
            <select name="pCategory">
                <option value="fruits">Fruits</option>
                <option value="vegetables">Vegetables</option>
                <option value="dairy">Dairy</option>
                <option value="frozen_food">Frozen Food</option>
                <option value="grocery">Grocery</option>
            </select>
            
            <button type="submit" class="category-btn active" style="width:100%; margin-top:20px;">Save to File</button>
        </form>
    </div>
</body>
</html>

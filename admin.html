<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
    <title>FreshMart | Online Grocery</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="head">
            <h1>FreshMart</h1>
            <h1 style="color:red">Admin</h1>
        </div>
        <nav>
            <span id="admin-link-container"></span>
            <a href="test.html">Home</a>
            <a href="#">About</a>
        </nav>
    </header>
    <section class="hero">
        <h2>from Farm to your Table</h2>
        <p>Healthy • Organic • Affordable</p>
    </section>    

    <section class="categories">
        <h2>Category</h2>
        <div class="category-container">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="fruits">Fruits</button>
            <button class="category-btn" data-category="vegetables">Vegetables</button>
            <button class="category-btn" data-category="dairy">Dairy</button>
            <button class="category-btn" data-category="frozen_food">Frozen Food</button>
            <button class="category-btn" data-category="grocery">Grocery</button>
        </div>
    </section>

    <div class="product-card">
        <img src="images/products_pics/PRNF.png" alt="Tomato">
        <h3>Tomato | 250g</h3>
        <p>Rs.140.00</p>
        <button onclick="addToCart(this)">Add to Cart</button>
    </div>
    

    <section class="footer">
    </section>
</body>

</html>

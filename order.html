<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
    <title>FreshMart | Online Grocery</title>
    <link rel="stylesheet" href="order.css">
    <script src="order.js"></script>
</head>
<body>
    <header class="navbar">
        <h1 class="head">FreshMart</h1>
        <nav>
            <span id="admin-link-container"></span>
            <a href="test.html">Home</a>
            <a href="#">About</a>
            <a href="#">Category</a>
            <a href="login.html" id="auth-link">Log in</a> 
        </nav>
    </header>

    <section class="hero">
        <h2>from Farm to your Table</h2>
        <p>Healthy • Organic • Affordable</p>
    </section>

    <section class="categories">
        <h2>Category</h2>
        <div class="category-container">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="fruits">Fruits</button>
            <button class="category-btn" data-category="vegetables">Vegetables</button>
            <button class="category-btn" data-category="dairy">Dairy</button>
            <button class="category-btn" data-category="frozen_food">Frozen Food</button>
            <button class="category-btn" data-category="grocery">Grocery</button>
        </div>
    </section>

    <section class="products" id="product-grid">
        <div class="product-card" data-category="fruits">
            <img src="images/products_pics/PRNF.png" alt="Bell Peppers">
            <h3>Yellow Bell Peppers | 250g</h3>
            <p>Rs.400.00</p>
            <button onclick="addToCart(this)">Add to Cart</button>
        </div>
        </section>

    <div class="cart-island" id="cart-island">
        <span id="island-text">Item Added!</span>
        <span class="count-badge" id="island-count">0</span>
    </div>

    <button id="topBtn" title="Go to top">↑</button>

    <section class="footer">
        </section>
</body>
</html>

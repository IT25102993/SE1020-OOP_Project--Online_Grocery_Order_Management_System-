<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
    <title>FreshMart | My Profile</title>
    <link rel="stylesheet" href="css/profile.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <h1 style="color:#14284a">FRESH<span style="color:#1fa831">MART</span></h1>
        <nav>
            <a href="index.html">HOME</a>
            <a href="order.html">SHOP</a>
            <a href="login.html" onclick="sessionStorage.clear()">LOGOUT</a>
        </nav>
    </header>

    <main class="profile-wrapper">
        <div class="profile-container">
            <div class="avatar-upload-section">
                <div class="avatar-container" id="avatar-container">
                    <img src="images/profile_avatar.png" alt="Profile" id="profile-img" class="profile-avatar">
                    <div class="avatar-overlay">
                        <i class='bx bx-camera'></i>
                        <span>Upload</span>
                    </div>
                </div>
                <input type="file" id="profile-upload" style="display: none;" accept="image/*">
                <h2 id="display-name">User Name</h2>
                <p id="display-email">user@example.com</p>
                <div id="membership-badge-wrap" style="margin-top: 10px;">
                    <span id="membership-badge" class="badge-silver">freshmartSilver (Regular)</span>
                </div>
            </div>

            <div class="details-section">
                <h3>Account Details</h3>
                <form id="profile-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profile-name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Email (Read-only)</label>
                        <input type="email" id="profile-email" readonly>
                    </div>
                    <div class="form-group">
                        <label>Shipping Address</label>
                        <input type="text" id="profile-address" required placeholder="Enter your full address">
                    </div>
                    <div class="form-group">
                        <label>Membership Level</label>
                        <select id="profile-membership" style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95em; outline: none; transition: 0.3s; background: white;">
                            <option value="REGULAR">freshmartSilver (Regular)</option>
                            <option value="PREMIUM">freshmartGOLD (Premium)</option>
                        </select>
                    </div>
                    
                    <div id="verification-wrap" style="display: none;">
                        <div class="form-group">
                            <label>Verification Code <span id="profile-timer"></span></label>
                            <input type="text" id="profile-code" placeholder="6-digit code">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="btn-send-code" class="btn-secondary">Send Verification Code</button>
                        <button type="submit" id="btn-save" class="btn-primary" style="display: none;">Save Changes</button>
                    </div>
                </form>
                <p id="profile-message" class="status-message"></p>
            </div>
        </div>

        <div class="orders-section">
            <h2 class="section-title">Past Order History</h2>
            <div id="orders-list">
                <p class="loading-text">Loading orders...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <h2><b>FreshMart</b></h2>
        <p>Healthy Living</p>
        <p>&copy; 2026 All Rights Reserved By FreshMart</p>
    </footer>

    <script src="js/profile.js"></script>
</body>
</html>

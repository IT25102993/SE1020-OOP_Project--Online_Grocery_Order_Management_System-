<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Payment Form</title>
  <style>
    body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }

    /* This hides the card section by default */
    #card-details {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background-color: #f9f9f9;
      border-left: 4px solid #007bff;
    }
  </style>
</head>
<body>

<h2>Checkout</h2>

<div class="form-group">
  <label for="payment-method">Select Payment Method:</label>
  <select id="payment-method" onchange="toggleCardDetails()">
    <option value="cash">Cash on Delivery</option>
    <option value="card">Credit / Debit Card</option>
    <option value="paypal">PayPal</option>
  </select>
</div>

<div id="card-details">
  <h3>Card Information</h3>
  <div class="form-group">
    <label>Card Number</label>
    <input type="text" placeholder="1234 5678 9101 1121">
  </div>
  <div style="display: flex; gap: 10px;">
    <div class="form-group" style="flex: 1;">
      <label>Expiry Date</label>
      <input type="text" placeholder="MM/YY">
    </div>
    <div class="form-group" style="flex: 1;">
      <label>CVV</label>
      <input type="text" placeholder="123">
    </div>
  </div>
</div>

<script>
  function toggleCardDetails() {
    const selection = document.getElementById('payment-method').value;
    const cardSection = document.getElementById('card-details');

    if (selection === 'card') {
      cardSection.style.display = 'block';
    } else {
      cardSection.style.display = 'none';
    }
  }
</script>

</body>
</html>

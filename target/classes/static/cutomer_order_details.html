<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart | Order Management</title>
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .orders-section {
            padding: 20px;
        }
        .order-item-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #edf2f7;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-REQUESTED { background: #fff3cd; color: #856404; }
        .status-PROCESSED { background: #cce5ff; color: #004085; }
        .status-DELIVERY_STARTED { background: #d1ecf1; color: #0c5460; }
        .status-ARRIVED { background: #d4edda; color: #155724; }
        .status-COMPLETED { background: #d4edda; color: #155724; }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .admin-btn {
            background: #23b236;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        .admin-btn.secondary { background: #2a5298; }
        /* Status Tracking */
        .status-track {
            display: flex;
            justify-content: space-between;
            margin: 30px 0 50px;
            position: relative;
            padding: 0 10px;
        }
        .status-track::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 40px;
            right: 40px;
            height: 3px;
            background: #e0e0e0;
            z-index: 1;
        }
        .step {
            width: 32px;
            height: 32px;
            background: #e0e0e0;
            border-radius: 50%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            position: relative;
            transition: 0.5s;
        }
        .step.active {
            background: #23b236;
            box-shadow: 0 0 12px rgba(35, 178, 54, 0.4);
        }
        .step .label {
            position: absolute;
            top: 40px;
            font-size: 10px;
            white-space: nowrap;
            color: #888;
            left: 50%;
            transform: translateX(-50%);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .step.active .label {
            color: #23b236;
            font-weight: bold;
        }
        .driver-select {
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-details">
        <i class="bx bx-leaf"></i>
        <span class="logo_name">FreshMart</span>
    </div>
    <ul class="nav-links">
        <li><a href="admin.html"><i class="bx bx-grid-alt"></i><span class="links_name">Dashboard</span></a></li>
        <li><a href="product.html"><i class="bx bx-box"></i><span class="links_name">Products</span></a></li>
        <li><a href="accounts.html"><i class="bx bx-user-circle"></i><span class="links_name">Accounts</span></a></li>
        <li><a href="admin_orders.html" class="active"><i class="bx bx-cart"></i><span class="links_name">Orders</span></a></li>
        <li class="log_out"><a href="login.html"><i class="bx bx-log-out"></i><span class="links_name">Log out</span></a></li>
    </ul>
</div>

<section class="home-section">
    <nav>
        <div class="sidebar-button">
            <i class="bx bx-menu sidebarBtn"></i>
            <span class="dashboard">Order Management</span>
        </div>
        <div class="profile-details">
            <span class="admin_name" id="adminName">Admin</span>
        </div>
    </nav>

    <div class="home-content">
        <div class="orders-section">
            <h2 style="margin-bottom: 20px;">Customer Orders</h2>
            <div id="admin-orders-list">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>
</section>

<script src="js/admin.js"></script>
<script src="js/admin_orders.js"></script>
</body>
</html>
